services:
  postgres:
    image: postgres:16-alpine
    container_name: devam-takip-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    image: gurcankavakci/attendance-tracker-backend:1.0.0
    container_name: devam-takip-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 3001
      APP_PASSWORD: ${APP_PASSWORD}
      TOKEN_SECRET: ${TOKEN_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: gurcankavakci/attendance-tracker-frontend:1.0.0
    container_name: devam-takip-web
    ports:
      - "3456:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
